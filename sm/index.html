<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>备用联系</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>备用联系</h1>
        <form id="send-message-form">
            <div class="input-group">
                <label for="appToken">App Token:</label>
                <input type="text" id="appToken" name="appToken" value="at" required>
            </div>
            <div class="input-group">
                <label for="topicId">Topic ID:</label>
                <input type="text" id="topicId" name="topicId" value="12345" required>
            </div>
            <div class="input-group">
                <label for="message">要发送的消息:</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            <button type="submit">发送</button>
        </form>
        <div class="status">
            <p id="status-message">等待发送...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
