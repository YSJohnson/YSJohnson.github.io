<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>吃呱网站合集</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-color: #1a1a1a;
      color: #ff9933;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }
    h1 {
      text-align: center;
      padding: 30px 0;
    }
    .container {
      max-width: 800px;
      width: 90%;
      margin: 0 auto;
      text-align: center;
      padding: 20px;
    }
    .group-box {
      background-color: #333;
      border-radius: 10px;
      padding: 30px;
      margin-bottom: 20px;
    }
    .btn {
      display: block;
      width: 200px;
      height: 40px;
      margin: 10px auto;
      background-color: #ff9933;
      color: #1a1a1a;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      text-decoration: none;
      line-height: 40px;
    }
    .btn:hover {
      background-color: #cc6600;
      cursor: pointer;
    }
    footer {
      text-align: center;
      background-color: #333;
      padding: 20px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
    .footer-text {
      color: #ff9933;
      font-size: 14px;
    }

    /* 验证框样式 */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      backdrop-filter: blur(10px);
    }
    .verification-box {
      background-color: rgba(51, 51, 51, 0.9);
      border-radius: 10px;
      padding: 20px;
    }
    .verification-text {
      color: #ff9933;
      font-size: 18px;
      margin-bottom: 10px;
    }
    .verification-input {
      width: 200px;
      height: 30px;
      padding: 5px;
      font-size: 14px;
    }
    .verification-btn {
      display: block;
      width: 80px;
      height: 30px;
      margin-top: 10px;
      background-color: #ff9933;
      color: #1a1a1a;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      text-decoration: none;
      line-height: 30px;
      text-align: center;
      cursor: pointer;
    }
    .verification-btn:hover {
      background-color: #cc6600;
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="verification-box">
      <p class="verification-text">请输入密码：</p>
      <input type="password" class="verification-input" id="passwordInput">
      <button class="verification-btn" onclick="verifyPassword()">确认</button>
    </div>
  </div>

  <script>
    function verifyPassword() {
      var passwordInput = document.getElementById("passwordInput");
      var overlay = document.getElementById("overlay");

      if (passwordInput.value === "403") {
        // 输入正确，显示页面
        overlay.style.display = "none";
      } else {
        // 输入错误，清空密码框并继续要求验证
        passwordInput.value = "";
        passwordInput.placeholder = "密码错误，请重新输入";
      }
    }
  </script>

  <h1>吃呱网站合集🤡</h1>
  <div class="container">
    <div class="group-box">
      <a href="https://huxwz1.ccgg9.com/" class="btn">51吃瓜</a>
      <a href="https://www.tiao2.net/" class="btn">娱乐718</a>
      <a href="https://www.jp12.se" class="btn">正能量</a>
      <a href="https://huijia.one/" class="btn">看料</a>
      <a href="https://www.52cg.app/" class="btn">吾爱吃瓜</a>
	  <a href="https://www.51ms.life/" class="btn">91吃瓜</a>
    </div>
  </div>
  <footer>
    <p class="footer-text">仅供学习与交流使用！Copyright © 2023 YSJohnson</p>
  </footer>
</body>
</html>
