  <style>
      body {
        background-color: #ffffff;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }
      
      #container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
  
      .page-title {
        color: #3388ff;
        text-align: center;
      }
      
      .input-group {
        margin-top: 30px;
      }
      
      .input-field {
        width: 100%;
        padding: 10px;
        font-size: 16px;
      }
      
      .button-group {
        margin-top: 20px;
        display: flex;
        justify-content: space-between;
      }
      
      .button-group button {
        padding: 10px;
        font-size: 16px;
        border: none;
        color: #fff;
        background-color: #3388ff;
        cursor: pointer;
        width: calc(20% - 8px);
      }
      
      .button-group button:hover {
        background-color: #1f69e8;
      }
      
      .info-group {
        margin-top: 30px;
        padding: 10px;
        border: 1px solid #ccc;
        background-color: #fff;
      }
      
      .info-group h2 {
        margin-top: 0;
        margin-bottom: 10px;
      }
      
      .info-group label {
        display: block;
      }
      
      .video-player {
        width: 100%;
        height: 400px;
        background-color: #f2f2f2;
      }
      
      .image-box {
        margin-top: 20px;
        width: 100%;
        height: auto;
        text-align: center;
      }
      
      .audio-player {
        margin-top: 20px;
        width: 100%;
        height: 60px;
        background-color: #f2f2f2;
      }
