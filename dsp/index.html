<!DOCTYPE html>
<html>
<head>
	<title>短视频解析</title>
	<style>
		body {
			background-color: #66B1FF;
			color: #ffffff;
			font-family: Arial, sans-serif;
		}

		h1 {
			text-align: center;
		}

		.container {
			width: 80%;
			margin: 0 auto;
			padding: 20px;
			text-align: center;
		}

		.input-box {
			margin-bottom: 20px;
		}

		.input-box input {
			width: 100%;
			padding: 10px;
			font-size: 16px;
			border: none;
			border-radius: 5px;
		}

		.input-box input::placeholder {
			color: #808080;
		}

		.button {
			display: inline-block;
			background-color: #4E6EF2;
			color: #ffffff;
			padding: 10px 30px;
			border: none;
			border-radius: 5px;
			cursor: pointer;
		}

		.clear-button {
			display: inline-block;
			background-color: #808080;
			color: #ffffff;
			padding: 10px 20px;
			border: none;
			border-radius: 5px;
			cursor: pointer;
			margin-left: 10px;
		}

		.download-button {
			display: inline-block;
			background-color: #4E6EF2;
			color: #ffffff;
			padding: 10px 20px;
			border: none;
			border-radius: 5px;
			cursor: pointer;
			margin-left: 10px;
		}

		.label {
			display: block;
			margin-bottom: 10px;
			font-weight: bold;
		}

		.video-player {
			width: 100%;
			height: auto;
			background-color: #dcdcdc; 
			margin-top: 20px;
		}

		.group-box {
			border: 1px solid #ffffff; 
			border-radius: 5px;
			padding: 10px;
			margin-bottom: 20px;
		}

		.hidden {
			display: none;
		}

		.result {
			display: flex;
			align-items: center;
			justify-content: center;
			flex-direction: column;
			margin-top: 20px;
		}

		.link {
			color: #ffffff;
			text-decoration: underline;
			margin-top: 10px;
		}

		@media (max-width: 768px) {
  			.container {
    			width: 90%;
  			}
		}
	</style>
	<script>
		function parseVideo() {
			var inputUrl = document.querySelector('input').value;
			var apiUrl = 'https://api.linhun.vip/api/xbys?url=' + encodeURIComponent(inputUrl) + "&apiKey=5788ec34a904ebcba54b599c7d6d061f";

			fetch(apiUrl)
				.then(response => response.json())
				.then(data => {
					if (data.code === 200) {
						document.getElementById('status').innerText = '解析成功';
						document.getElementById('title').innerText = data.title;
						document.getElementById('videoPlayer').src = data.video;
						document.getElementById('downloadButton').href = data.video;
						document.getElementById('downloadButton').classList.remove('hidden');
						showResult();
					} else {
						document.getElementById('status').innerText = '解析失败';
						document.getElementById('downloadButton').classList.add('hidden');
					}
				})
				.catch(error => {
					document.getElementById('status').innerText = '解析失败';
					console.error('解析视频失败:', error);
					document.getElementById('downloadButton').classList.add('hidden');
				});
		}

		function clearResult() {
			document.querySelector('input').value = '';
			document.getElementById('status').innerText = '';
			document.getElementById('title').innerText = '';
			document.getElementById('videoPlayer').src = '';
			document.getElementById('downloadButton').classList.add('hidden'); 
			hideResult();
		}

		function showResult() {
			var resultElements = document.getElementsByClassName('result');
			for (var i = 0; i < resultElements.length; i++) {
				resultElements[i].classList.remove('hidden');
			}
		}

		function hideResult() {
			var resultElements = document.getElementsByClassName('result');
			for (var i = 0; i < resultElements.length; i++) {
				resultElements[i].classList.add('hidden');
			}
		}

	</script>
</head>
<body>
	<div class="container">
		<h1>短视频解析</h1>
		<div class="input-box group-box">
			<input type="text" placeholder="在这里粘贴链接 无须去除文字 直接复制黏贴即可 不能有#">
			<button class="button" onclick="parseVideo()">解析</button>
			<button class="clear-button" onclick="clearResult()">清空</button>
			<a id="downloadButton" class="download-button hidden" download>下载</a>
		</div>
		<div class="result group-box hidden">
			<div class="status">
				<span id="status"></span>
			</div>
			<div class="title">
				<span id="title"></span>
			</div>
			<div class="video-player group-box">

			</div>
		</div>
		
	</div>
</body>
