<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Music Website</title>
    <style>
        body {
            background-color: #f1f1f1;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #2196f3;
            text-align: center;
        }

        select, textarea, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Music Website</h1>
        <select id="playlist">
            <option value="song1">Song 1</option>
            <option value="song2">Song 2</option>
            <option value="song3">Song 3</option>
        </select>
        <audio id="audioPlayer" controls></audio>
        <textarea id="editor" rows="4" placeholder="Enter your message"></textarea>
        <button id="submitBtn">Submit</button>
    </div>

    <script>
        const playlist = document.getElementById("playlist");
        const audioPlayer = document.getElementById("audioPlayer");
        const editor = document.getElementById("editor");
        const submitBtn = document.getElementById("submitBtn");

        playlist.addEventListener("change", function() {
            const selectedSong = playlist.value;
            audioPlayer.src = selectedSong + ".mp3";
        });

        submitBtn.addEventListener("click", function() {
            const message = editor.value;
            // Perform some action with the message
            console.log("Message:", message);
        });
    </script>
</body>
</html>
